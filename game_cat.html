<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓咪抓魚</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: url('img/loginbg.jpg') center/cover no-repeat fixed;
        overflow: hidden;
        user-select: none;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* ── 頂部列 ── */
    .top-bar {
        width: 100%;
        background: rgba(0,0,20,.75);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
        z-index: 10;
    }
    .top-bar a           { color: #aaccff; text-decoration: none; font-size: 16px; font-weight: bold; }
    .top-bar a:hover     { color: #fff; }
    .top-bar .page-title { color: #fff; font-size: 17px; font-weight: bold; }

    /* 全螢幕時隱藏頂部列 */
    :fullscreen .top-bar,
    :-webkit-full-screen .top-bar { display: none; }

    /* ── 置中區 ── */
    .game-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow: hidden;
    }
    :fullscreen .game-area,
    :-webkit-full-screen .game-area {
        padding: 0;
        background: #000;
    }

    /* ── 遊戲卡片 ── */
    .game-card {
        position: relative;
        background: url('img/catgamebg.png') center/cover no-repeat;
        border-radius: 22px;
        box-shadow: 0 10px 40px rgba(0,0,0,.55);
        overflow: hidden;
        transition: border-radius 0.3s;
    }
    :fullscreen .game-card,
    :-webkit-full-screen .game-card { border-radius: 0; }

    #gameCanvas { display: block; cursor: crosshair; }

    /* ── 開始畫面遮罩 ── */
    #startOverlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,.52);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        z-index: 30;
        border-radius: inherit;
        transition: opacity 0.4s;
    }
    #startOverlay.hidden {
        opacity: 0;
        pointer-events: none;
    }
    #startOverlay .start-title {
        color: #fff;
        font-size: clamp(22px, 4vw, 36px);
        font-weight: bold;
        text-shadow: 0 3px 10px rgba(0,0,0,.8);
        letter-spacing: 3px;
    }
    #startOverlay .start-desc {
        color: #ffe9b0;
        font-size: clamp(13px, 2vw, 17px);
        text-shadow: 0 2px 6px rgba(0,0,0,.7);
        text-align: center;
        padding: 0 20px;
        line-height: 1.8;
    }
    #btnStart {
        padding: 16px 52px;
        background: #ffd700;
        color: #333;
        font-size: clamp(16px, 2.5vw, 22px);
        font-weight: bold;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-family: "Microsoft JhengHei", sans-serif;
        letter-spacing: 3px;
        box-shadow: 0 4px 18px rgba(255,215,0,.5);
        transition: transform .15s, background .2s;
    }
    #btnStart:hover  { background: #ffec60; transform: scale(1.06); }
    #btnStart:active { transform: scale(0.97); }

    /* ── 遊戲 UI ── */
    #ui {
        position: absolute;
        top: 12px;
        left: 16px;
        z-index: 10;
        color: #fff;
        font-size: 20px;
        text-shadow: 0 2px 6px rgba(0,0,0,.8);
        pointer-events: none;
    }
    #restartBtn {
        pointer-events: auto;
        padding: 10px 22px;
        font-size: 15px;
        background: #ffd700;
        color: #333;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        display: none;
        margin-top: 10px;
        font-family: "Microsoft JhengHei", sans-serif;
        font-weight: bold;
    }
    #winMsg {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 30px;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 4px 12px rgba(0,0,0,.85);
        display: none;
        pointer-events: none;
        z-index: 20;
        white-space: nowrap;
    }
    #timerBar {
        position: absolute;
        bottom: 0; left: 0;
        height: 5px;
        background: #ffd700;
        width: 100%;
        transform-origin: left;
        z-index: 10;
    }

    /* 全螢幕離開按鈕 */
    #exitFsBtn {
        position: absolute;
        top: 12px; right: 14px;
        z-index: 40;
        background: rgba(0,0,0,.45);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 6px 14px;
        font-size: 13px;
        cursor: pointer;
        display: none;
        font-family: "Microsoft JhengHei", sans-serif;
        letter-spacing: 1px;
    }
    :fullscreen #exitFsBtn,
    :-webkit-full-screen #exitFsBtn { display: block; }
</style>
</head>
<body>

<div class="top-bar">
    <a href="game_select.html">← 返回</a>
    <span class="page-title">🐱 貓咪抓魚</span>
</div>

<div class="game-area">
    <div class="game-card" id="gameCard">

        <!-- 開始遮罩 -->
        <div id="startOverlay">
            <div class="start-title">🐱 貓咪抓魚</div>
            <div class="start-desc">點擊螢幕上游動的魚<br>15 秒內看你能抓幾隻！</div>
            <button id="btnStart" onclick="enterGame()">🎮 開始遊戲</button>
        </div>

        <div id="ui">
            抓到：<span id="score">0</span> / 15 隻<br>
            時間：<span id="timeLeft">15</span>s
            <br><button id="restartBtn" onclick="initGame()">🔄 重新開始</button>
        </div>
        <div id="winMsg"></div>
        <div id="timerBar"></div>
        <button id="exitFsBtn" onclick="exitFullscreen()">✕ 離開全螢幕</button>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
const canvas     = document.getElementById("gameCanvas");
const ctx        = canvas.getContext("2d");
const gameCard   = document.getElementById("gameCard");
const topBar     = document.querySelector('.top-bar');
const scoreEl    = document.getElementById("score");
const timeEl     = document.getElementById("timeLeft");
const restartBtn = document.getElementById("restartBtn");
const winMsg     = document.getElementById("winMsg");
const timerBar   = document.getElementById("timerBar");
const startOverlay = document.getElementById("startOverlay");

/* ── 預載魚圖片 ── */
const fishImages = [];
for (let i = 1; i <= 5; i++) {
    const img = new Image();
    img.src = `img/fish_${i}.png`;
    fishImages.push(img);
}

/* ── 尺寸計算 ── */
function resize() {
    const isFs = !!(document.fullscreenElement || document.webkitFullscreenElement);
    let availW, availH;
    if (isFs) {
        availW = window.screen.width;
        availH = window.screen.height;
    } else {
        availH = window.innerHeight - topBar.offsetHeight - 32;
        availW = window.innerWidth - 32;
    }
    const w = Math.min(availW, availH * 1.65, isFs ? 99999 : 960);
    const h = Math.round(w / 1.65);
    gameCard.style.width  = w + "px";
    gameCard.style.height = h + "px";
    canvas.width  = w;
    canvas.height = h;
}
resize();
window.addEventListener("resize", resize);
document.addEventListener("fullscreenchange", resize);
document.addEventListener("webkitfullscreenchange", resize);

/* ── 進入遊戲（全螢幕 + 開始）── */
function enterGame() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) {
        req.call(el).catch(() => {});
    }
    startOverlay.classList.add("hidden");
    initGame(); 
}

function exitFullscreen() {
    const exit = document.exitFullscreen || document.webkitExitFullscreen;
    if (exit) exit.call(document);
}

/* ── 遊戲狀態 ── */
let fishes = [], particles = [], score = 0;
let timeLeft = 15, gameRunning = false;
let timerInterval = null;

function createFish() {
    const goRight = Math.random() > .5;
    return {
        x:      goRight ? -50 : canvas.width + 50,
        y:      70 + Math.random() * (canvas.height - 140),
        size:   22 + Math.random() * 18,
        dx:     (goRight ? 1 : -1) * (1.3 + Math.random() * 2.2),
        dy:     (Math.random() - .5) * 1.4,
        imgIdx: Math.floor(Math.random() * 5),
        flipped: Math.random() > .5,
    };
}

function initGame() {
    fishes = [];
    particles = [];
    for (let i = 0; i < 15; i++) fishes.push(createFish());
    score = 0;
    timeLeft = 15;
    scoreEl.textContent      = 0;
    timeEl.textContent       = 15;
    restartBtn.style.display = "none";
    winMsg.style.display     = "none";

    timerBar.style.transition = "none";
    timerBar.style.transform  = "scaleX(1)";
    requestAnimationFrame(() => {
        timerBar.style.transition = `transform ${timeLeft}s linear`;
        timerBar.style.transform  = "scaleX(0)";
    });

    gameRunning = true;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!gameRunning) return;
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame(false);
    }, 1000);
}

function endGame(won) {
    gameRunning = false;
    clearInterval(timerInterval);
    restartBtn.style.display = "inline-block";
    winMsg.innerHTML = won
        ? `🎉 全部抓完！<br><span style="font-size:22px;color:#ffd700">共抓到 ${score} 隻！</span>`
        : `⏰ 時間到！<br><span style="font-size:22px;color:#ffd700">抓到 ${score} / 15 隻</span>`;
    winMsg.style.display = "block";
}

function tryClick(mx, my) {
    if (!gameRunning) return;
    for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        if (Math.hypot(mx - f.x, my - f.y) < f.size + 10) {
            spawnParticles(f.x, f.y);
            fishes.splice(i, 1);
            score++;
            scoreEl.textContent = score;
            if (fishes.length === 0) endGame(true);
            break;
        }
    }
}

canvas.addEventListener("mousedown", e => {
    const r = canvas.getBoundingClientRect();
    tryClick(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    tryClick(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

function spawnParticles(x, y) {
    for (let i = 0; i < 12; i++) {
        particles.push({ x, y,
            dx: (Math.random()-.5)*8, dy: (Math.random()-.5)*8,
            life: 24, hue: Math.floor(Math.random()*360) });
    }
}

function drawFish(f) {
    const img = fishImages[f.imgIdx];
    if (!img.complete || img.naturalWidth === 0) return;
    const w = f.size * 2.8;
    const h = img.naturalHeight > 0 ? w * (img.naturalHeight / img.naturalWidth) : w;
    ctx.save();
    ctx.translate(f.x, f.y);
    ctx.scale(f.dx < 0 ? -1 : 1, 1);
    ctx.rotate(Math.PI / 2);
    ctx.drawImage(img, -w/2, -h/2, w, h);
    ctx.restore();
}

function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    fishes.forEach(f => {
        f.x += f.dx; f.y += f.dy;
        if (f.dx>0 && f.x > canvas.width+60)  f.x = -60;
        if (f.dx<0 && f.x < -60)               f.x = canvas.width+60;
        if (f.y<20 || f.y>canvas.height-20)    f.dy *= -1;
        drawFish(f);
    });
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        ctx.fillStyle = `hsla(${p.hue},90%,65%,${p.life/24})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4*(p.life/24), 0, Math.PI*2);
        ctx.fill();
        p.x += p.dx; p.y += p.dy; p.life--;
    });
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
