<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貓咪抓魚</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        background: url('img/loginbg.jpg') center/cover no-repeat fixed;
        overflow: hidden;
        user-select: none;
        font-family: "Microsoft JhengHei", sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    /* ── 頂部列 ── */
    .top-bar {
        width: 100%;
        background: rgba(0, 0, 20, .75);
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        flex-shrink: 0;
        z-index: 10;
    }
    .top-bar a            { color: #aaccff; text-decoration: none; font-size: 16px; font-weight: bold; }
    .top-bar a:hover      { color: #fff; }
    .top-bar .page-title  { color: #fff; font-size: 17px; font-weight: bold; }

    /* ── 置中區 ── */
    .game-area {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow: hidden;
    }

    /* ── 遊戲卡片 ── */
    .game-card {
        position: relative;
        background: url('img/catgamebg.png') center/cover no-repeat;
        border-radius: 22px;
        box-shadow: 0 10px 40px rgba(0,0,0,.55);
        overflow: hidden;
    }

    #gameCanvas { display: block; cursor: crosshair; }

    /* ── 遊戲 UI（疊在卡片上） ── */
    #ui {
        position: absolute;
        top: 12px;
        left: 16px;
        z-index: 10;
        color: #fff;
        font-size: 20px;
        text-shadow: 0 2px 6px rgba(0,0,0,.8);
        pointer-events: none;
    }
    #restartBtn {
        pointer-events: auto;
        padding: 10px 22px;
        font-size: 15px;
        background: #ffd700;
        color: #333;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        display: none;
        margin-top: 10px;
        font-family: "Microsoft JhengHei", sans-serif;
        font-weight: bold;
    }
    #winMsg {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-size: 30px;
        font-weight: bold;
        text-align: center;
        text-shadow: 0 4px 12px rgba(0,0,0,.85);
        display: none;
        pointer-events: none;
        z-index: 20;
        white-space: nowrap;
    }
    #timerBar {
        position: absolute;
        bottom: 0; left: 0;
        height: 5px;
        background: #ffd700;
        width: 100%;
        transform-origin: left;
        z-index: 10;
    }
</style>
</head>
<body>

<div class="top-bar">
    <a href="game_select.php">← 返回</a>
    <span class="page-title">🐱 貓咪抓魚</span>
</div>

<div class="game-area">
    <div class="game-card" id="gameCard">
        <div id="ui">
            抓到：<span id="score">0</span> / 15 隻<br>
            時間：<span id="timeLeft">15</span>s
            <br><button id="restartBtn" onclick="initGame()">🔄 重新開始</button>
        </div>
        <div id="winMsg"></div>
        <div id="timerBar"></div>
        <canvas id="gameCanvas"></canvas>
    </div>
</div>

<script>
const canvas     = document.getElementById("gameCanvas");
const ctx        = canvas.getContext("2d");
const gameCard   = document.getElementById("gameCard");
const topBar     = document.querySelector('.top-bar');
const scoreEl    = document.getElementById("score");
const timeEl     = document.getElementById("timeLeft");
const restartBtn = document.getElementById("restartBtn");
const winMsg     = document.getElementById("winMsg");
const timerBar   = document.getElementById("timerBar");

/* ── 預載 5 張魚圖片 ── */
const fishImages = [];
for (let i = 1; i <= 5; i++) {
    const img = new Image();
    img.src = `img/fish_${i}.png`;
    fishImages.push(img);
}

/* ── 卡片 / Canvas 尺寸 ── */
function resize() {
    const availH = window.innerHeight - topBar.offsetHeight - 32;
    const availW = window.innerWidth - 32;
    const w = Math.min(availW, availH * 1.65, 960);
    const h = Math.round(w / 1.65);
    gameCard.style.width  = w + "px";
    gameCard.style.height = h + "px";
    canvas.width  = w;
    canvas.height = h;
}
resize();
window.addEventListener("resize", resize);

/* ── 遊戲狀態 ── */
let fishes = [], particles = [], score = 0;
let timeLeft = 15, gameRunning = false;
let timerInterval = null;

/* ── 建立一條魚 ── */
function createFish() {
    const goRight = Math.random() > .5;
    const flipped = Math.random() > .5;
    return {
        x:       goRight ? -50 : canvas.width + 50,
        y:       70 + Math.random() * (canvas.height - 140),
        size:    22 + Math.random() * 18,           // 半徑，用於碰撞
        dx:      (goRight ? 1 : -1) * (1.3 + Math.random() * 2.2),
        dy:      (Math.random() - .5) * 1.4,
        imgIdx:  Math.floor(Math.random() * 5),     // 隨機選 fish_1~5
        flipped: Math.random() > .5,                // 隨機水平翻轉
    };
}

/* ── 初始化 ── */
function initGame() {
    fishes = [];
    particles = [];
    for (let i = 0; i < 15; i++) fishes.push(createFish());
    score = 0;
    timeLeft = 15;
    scoreEl.textContent      = 0;
    timeEl.textContent       = 15;
    restartBtn.style.display = "none";
    winMsg.style.display     = "none";

    // 重設計時條
    timerBar.style.transition = "none";
    timerBar.style.transform  = "scaleX(1)";
    requestAnimationFrame(() => {
        timerBar.style.transition = `transform ${timeLeft}s linear`;
        timerBar.style.transform  = "scaleX(0)";
    });

    gameRunning = true;
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        if (!gameRunning) return;
        timeLeft--;
        timeEl.textContent = timeLeft;
        if (timeLeft <= 0) endGame(false);
    }, 1000);
}

/* ── 結束 ── */
function endGame(won) {
    gameRunning = false;
    clearInterval(timerInterval);
    restartBtn.style.display = "inline-block";
    winMsg.innerHTML = won
        ? `🎉 全部抓完！<br><span style="font-size:22px;color:#ffd700">共抓到 ${score} 隻！</span>`
        : `⏰ 時間到！<br><span style="font-size:22px;color:#ffd700">抓到 ${score} / 15 隻</span>`;
    winMsg.style.display = "block";
}

/* ── 點擊 / 觸控 ── */
function tryClick(mx, my) {
    if (!gameRunning) return;
    for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        if (Math.hypot(mx - f.x, my - f.y) < f.size + 10) {
            spawnParticles(f.x, f.y);
            fishes.splice(i, 1);
            score++;
            scoreEl.textContent = score;
            if (fishes.length === 0) endGame(true);
            break;
        }
    }
}
canvas.addEventListener("mousedown", e => {
    const r = canvas.getBoundingClientRect();
    tryClick(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener("touchstart", e => {
    e.preventDefault();
    const r = canvas.getBoundingClientRect();
    const t = e.touches[0];
    tryClick(t.clientX - r.left, t.clientY - r.top);
}, { passive: false });

/* ── 粒子爆炸 ── */
function spawnParticles(x, y) {
    for (let i = 0; i < 12; i++) {
        particles.push({
            x, y,
            dx:   (Math.random() - .5) * 8,
            dy:   (Math.random() - .5) * 8,
            life: 24,
            hue:  Math.floor(Math.random() * 360),
        });
    }
}

/* ── 畫魚（使用圖片）── */
function drawFish(f) {
    const img = fishImages[f.imgIdx];
    if (!img.complete || img.naturalWidth === 0) return; // 圖片尚未載入

    const w = f.size * 2.8;
    const h = img.naturalHeight > 0
        ? w * (img.naturalHeight / img.naturalWidth)
        : w;

    ctx.save();
    ctx.translate(f.x, f.y);

    // 水平翻轉：移動方向 × 隨機翻轉
    // dx > 0 朝右（不翻）；dx < 0 朝左（翻）；flipped 再疊一層隨機
    const scaleX = (f.dx < 0 ? -1 : 1)
    ctx.scale(scaleX, 1);
    ctx.rotate(Math.PI / 2);
    ctx.drawImage(img, -w / 2, -h / 2, w, h);
    ctx.restore();
}

/* ── 主迴圈 ── */
function gameLoop() {
    // Canvas 透明 → 讓卡片的 catgamebg.png 透出
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 更新 & 繪製魚
    fishes.forEach(f => {
        f.x += f.dx;
        f.y += f.dy;
        if (f.dx > 0 && f.x >  canvas.width  + 60) f.x = -60;
        if (f.dx < 0 && f.x < -60)                  f.x = canvas.width + 60;
        if (f.y < 20 || f.y > canvas.height - 20)   f.dy *= -1;
        drawFish(f);
    });

    // 粒子
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
        ctx.fillStyle = `hsla(${p.hue},90%,65%,${p.life / 24})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 4 * (p.life / 24), 0, Math.PI * 2);
        ctx.fill();
        p.x += p.dx;
        p.y += p.dy;
        p.life--;
    });

    requestAnimationFrame(gameLoop);
}

initGame();
gameLoop();
</script>
</body>
</html>
